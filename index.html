<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRPG 상태창</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="캐릭터 목록 열기" aria-expanded="false" aria-controls="characterSidebar">
      <span aria-hidden="true">☰</span>
    </button>

    <aside class="character-sidebar" id="characterSidebar" aria-label="캐릭터 목록" aria-hidden="true">
      <div class="sidebar-head">
        <p class="eyebrow">Characters</p>
        <h2>캐릭터 선택</h2>
      </div>
      <div class="character-buttons" id="characterButtons"></div>
    </aside>

    <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="캐릭터 목록 닫기"></button>

    <main class="app-shell">
      <header class="topbar">
        <div class="title-lockup" aria-label="캐릭터 상태창">
          <span class="sigil" id="characterSigil">리</span>
          <div>
            <p class="eyebrow">TRPG Character Profile</p>
            <h1 id="characterName">리아</h1>
          </div>
        </div>

        <div class="top-actions">
          <nav class="tabs" role="tablist" aria-label="상태창 메뉴">
            <button class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="overviewPanel" data-tab="overview">
              상태
            </button>
            <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="equipmentPanel" data-tab="equipment">
              장비
            </button>
            <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="skillsPanel" data-tab="skills">
              스킬
            </button>
          </nav>

          <button class="gm-button" id="gmLoginButton" type="button" aria-haspopup="dialog">
            GM 로그인
          </button>
        </div>
      </header>

      <section class="dashboard" aria-labelledby="characterName">
        <aside class="portrait-panel">
          <div class="portrait-frame">
            <img id="portraitImage" src="./assets/ria.png" alt="리아 캐릭터 프로필" />
          </div>

          <div class="identity">
            <div>
              <span class="identity-label">대표</span>
              <strong id="characterRole">총사</strong>
            </div>
            <div>
              <span class="identity-label">성향</span>
              <strong id="characterTendency">냉정함</strong>
            </div>
          </div>

          <dl class="resource-list" id="resourceList"></dl>
        </aside>

        <section class="screen-panel">
          <section class="panel is-active" id="overviewPanel" role="tabpanel" data-panel="overview">
            <div class="overview-grid">
              <article class="summary-block">
                <p class="section-kicker">전투 요약</p>
                <div class="combat-strip" id="combatStrip"></div>
              </article>

              <article class="summary-block">
                <p class="section-kicker">상태 조정</p>
                <div class="status-note">
                  <span>피해</span>
                  <strong id="damageTakenLabel">0</strong>
                  <span>SP 소모</span>
                  <strong id="staminaSpentLabel">9</strong>
                </div>
              </article>
            </div>

            <section class="stat-board" aria-labelledby="statHeading">
              <div class="board-heading">
                <div>
                  <p class="section-kicker">총 합계 능력치</p>
                  <h2 id="statHeading">기본 + 장비 + 스킬 + 상태</h2>
                </div>
              </div>
              <div class="stat-table" id="statTable"></div>
            </section>
          </section>

          <section class="panel" id="equipmentPanel" role="tabpanel" data-panel="equipment" hidden>
            <div class="panel-heading">
              <p class="section-kicker">장비</p>
              <h2>착용 슬롯</h2>
            </div>
            <div class="gear-grid" id="gearGrid"></div>
          </section>

          <section class="panel" id="skillsPanel" role="tabpanel" data-panel="skills" hidden>
            <div class="panel-heading">
              <p class="section-kicker">스킬</p>
              <h2>보유 스킬</h2>
            </div>
            <div class="skill-grid" id="skillGrid"></div>
          </section>
        </section>
      </section>
    </main>

    <div class="gm-dialog" id="gmDialog" role="dialog" aria-modal="true" aria-labelledby="gmDialogTitle" hidden>
      <form class="gm-card" id="gmForm">
        <div class="gm-dialog-head">
          <div>
            <p class="eyebrow">Game Master</p>
            <h2 id="gmDialogTitle">GM 인증</h2>
          </div>
          <button class="gm-close" id="gmCloseButton" type="button" aria-label="GM 인증 닫기">×</button>
        </div>

        <label class="gm-field">
          <span>비밀번호</span>
          <input id="gmPasswordInput" type="password" inputmode="numeric" autocomplete="current-password" />
        </label>
        <p class="gm-error" id="gmError" role="alert"></p>
        <button class="gm-submit" type="submit">확인</button>
      </form>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
